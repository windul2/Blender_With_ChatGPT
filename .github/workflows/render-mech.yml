name: Build and Render Mid-Poly Mech

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: "렌더 이미지의 가로·세로 해상도"
        required: true
        default: "1024"
        type: choice
        options:
          - "768"
          - "1024"
          - "1440"
      samples:
        description: "Cycles 렌더 샘플 수"
        required: true
        default: "32"
        type: choice
        options:
          - "16"
          - "32"
          - "64"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/render-mech.yml"
      - "scripts/create_mech.py"

permissions:
  contents: read

concurrency:
  group: mech-render-${{ github.ref }}
  cancel-in-progress: true

env:
  BLENDER_VERSION: "4.5.11"
  BLENDER_SERIES: "4.5"
  RENDER_RESOLUTION: ${{ inputs.resolution || '1024' }}
  RENDER_SAMPLES: ${{ inputs.samples || '32' }}

jobs:
  model-and-render:
    name: Create mech and render PNG
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Blender runtime libraries
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            xz-utils \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libsm6 \
            libx11-6 \
            libxfixes3 \
            libxi6 \
            libxkbcommon0 \
            libxrender1 \
            libxxf86vm1

      - name: Download Blender LTS
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          URL="https://download.blender.org/release/Blender${BLENDER_SERIES}/${ARCHIVE}"
          INSTALL_DIR="${RUNNER_TEMP}/blender"

          curl --fail --location --retry 3 --retry-delay 5 \
            "$URL" \
            --output "${RUNNER_TEMP}/${ARCHIVE}"

          mkdir -p "$INSTALL_DIR"
          tar -xJf "${RUNNER_TEMP}/${ARCHIVE}" \
            --strip-components=1 \
            --directory "$INSTALL_DIR"

          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/blender" --version

      - name: Generate model and render image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output

          blender \
            --background \
            --factory-startup \
            --python scripts/create_mech.py \
            -- \
            --output-dir "$GITHUB_WORKSPACE/output" \
            --resolution "$RENDER_RESOLUTION" \
            --samples "$RENDER_SAMPLES"

      - name: Verify generated files
        shell: bash
        run: |
          set -euo pipefail
          test -s output/mech_render.png
          test -s output/mid_poly_mech.blend
          test -s output/mid_poly_mech.glb
          test -s output/render_info.txt
          file output/mech_render.png
          ls -lh output

      - name: Upload downloadable render and model
        uses: actions/upload-artifact@v4
        with:
          name: mid-poly-mech-${{ github.run_number }}
          path: |
            output/mech_render.png
            output/mid_poly_mech.blend
            output/mid_poly_mech.glb
            output/render_info.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
