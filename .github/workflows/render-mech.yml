name: Build and Render Hero Chibi Mech

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: "렌더 이미지의 가로·세로 해상도"
        required: true
        default: "1024"
        type: choice
        options:
          - "768"
          - "1024"
          - "1440"
      samples:
        description: "Cycles 렌더 샘플 수"
        required: true
        default: "96"
        type: choice
        options:
          - "64"
          - "96"
          - "128"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/render-mech.yml"
      - "create_mech.py"
      - "scripts/create_mech.py"

permissions:
  contents: read

concurrency:
  group: mech-render-${{ github.ref }}
  cancel-in-progress: true

env:
  BLENDER_VERSION: "4.5.11"
  BLENDER_SERIES: "4.5"
  RENDER_RESOLUTION: ${{ inputs.resolution || '1024' }}
  RENDER_SAMPLES: ${{ inputs.samples || '96' }}

jobs:
  model-and-render:
    name: Create hero chibi mech and render PNG
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository root: $GITHUB_WORKSPACE"
          find . -maxdepth 4 -type f -print | sort

      - name: Locate Blender Python script
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "scripts/create_mech.py" ]]; then
            SCRIPT_PATH="$GITHUB_WORKSPACE/scripts/create_mech.py"
          elif [[ -f "create_mech.py" ]]; then
            SCRIPT_PATH="$GITHUB_WORKSPACE/create_mech.py"
          else
            echo "::error::create_mech.py를 찾을 수 없습니다. 저장소 최상위 또는 scripts 폴더에 올려 주세요."
            exit 1
          fi

          echo "MECH_SCRIPT=$SCRIPT_PATH" >> "$GITHUB_ENV"
          echo "Using Blender script: $SCRIPT_PATH"
          python3 -m py_compile "$SCRIPT_PATH"

      - name: Install Blender runtime libraries
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            xz-utils \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libsm6 \
            libx11-6 \
            libxfixes3 \
            libxi6 \
            libxkbcommon0 \
            libxrender1 \
            libxxf86vm1

      - name: Download Blender LTS
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          URL="https://download.blender.org/release/Blender${BLENDER_SERIES}/${ARCHIVE}"
          INSTALL_DIR="${RUNNER_TEMP}/blender"

          echo "Downloading: $URL"
          curl --fail --location --retry 3 --retry-delay 5 \
            "$URL" \
            --output "${RUNNER_TEMP}/${ARCHIVE}"

          mkdir -p "$INSTALL_DIR"
          tar -xJf "${RUNNER_TEMP}/${ARCHIVE}" \
            --strip-components=1 \
            --directory "$INSTALL_DIR"

          echo "BLENDER_BIN=$INSTALL_DIR/blender" >> "$GITHUB_ENV"
          "$INSTALL_DIR/blender" --version

      - name: Generate model and render image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/output"

          echo "Script: $MECH_SCRIPT"
          echo "Resolution: $RENDER_RESOLUTION"
          echo "Samples: $RENDER_SAMPLES"

          "$BLENDER_BIN" \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python "$MECH_SCRIPT" \
            -- \
            --output-dir "$GITHUB_WORKSPACE/output" \
            --resolution "$RENDER_RESOLUTION" \
            --samples "$RENDER_SAMPLES" \
            2>&1 | tee "$GITHUB_WORKSPACE/output/blender.log"

      - name: Verify generated files
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "output/mech_render.png"
            "output/mid_poly_mech.blend"
            "output/mid_poly_mech.glb"
            "output/render_info.txt"
          )

          echo "Generated output:"
          find output -maxdepth 2 -type f -printf '%p  %s bytes\n' | sort || true

          for generated_file in "${REQUIRED_FILES[@]}"; do
            if [[ ! -s "$generated_file" ]]; then
              echo "::error file=$generated_file::필수 결과 파일이 없거나 크기가 0입니다."
              exit 1
            fi
          done

          file output/mech_render.png
          ls -lh output

      - name: Upload downloadable render and model
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hero-chibi-mech-${{ github.run_number }}
          path: output/
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
