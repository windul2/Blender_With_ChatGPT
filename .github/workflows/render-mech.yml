name: Build Render and Score Hero Chibi Mech V13

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: "렌더 이미지의 가로·세로 해상도"
        required: true
        default: "1440"
        type: choice
        options:
          - "1024"
          - "1440"
          - "2048"
      samples:
        description: "Cycles 렌더 샘플 수"
        required: true
        default: "192"
        type: choice
        options:
          - "160"
          - "192"
          - "256"
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/render-mech.yml"
      - "create_mech.py"
      - "scripts/measure_similarity.py"
      - "reference/reference.jpg"

permissions:
  contents: read

concurrency:
  group: mech-render-score-v13-${{ github.ref }}
  cancel-in-progress: true

env:
  BLENDER_VERSION: "4.5.11"
  BLENDER_SERIES: "4.5"
  RENDER_RESOLUTION: ${{ inputs.resolution || '1440' }}
  RENDER_SAMPLES: ${{ inputs.samples || '192' }}

jobs:
  model-render-score:
    name: Render V13 mech and compute similarity score
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail
          test -f create_mech.py || { echo "::error::create_mech.py missing"; exit 1; }
          test -f scripts/measure_similarity.py || { echo "::error::scripts/measure_similarity.py missing"; exit 1; }
          test -f reference/reference.jpg || { echo "::error::reference/reference.jpg missing"; exit 1; }
          python3 -m py_compile create_mech.py
          python3 -m py_compile scripts/measure_similarity.py

      - name: Install Python deps for scoring
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow numpy scikit-image

      - name: Install Blender runtime libraries
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl xz-utils \
            libdbus-1-3 libegl1 libgl1 libsm6 libx11-6 \
            libxfixes3 libxi6 libxkbcommon0 libxrender1 libxxf86vm1

      - name: Download Blender LTS
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          URL="https://download.blender.org/release/Blender${BLENDER_SERIES}/${ARCHIVE}"
          INSTALL_DIR="${RUNNER_TEMP}/blender"
          curl --fail --location --retry 3 --retry-delay 5 "$URL" --output "${RUNNER_TEMP}/${ARCHIVE}"
          mkdir -p "$INSTALL_DIR"
          tar -xJf "${RUNNER_TEMP}/${ARCHIVE}" --strip-components=1 --directory "$INSTALL_DIR"
          echo "BLENDER_BIN=$INSTALL_DIR/blender" >> "$GITHUB_ENV"
          "$INSTALL_DIR/blender" --version

      - name: Render mech
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          "$BLENDER_BIN" \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python create_mech.py \
            -- \
            --output-dir "$GITHUB_WORKSPACE/output" \
            --resolution "$RENDER_RESOLUTION" \
            --samples "$RENDER_SAMPLES" \
            2>&1 | tee "$GITHUB_WORKSPACE/output/blender.log"

      - name: Verify render exists
        shell: bash
        run: |
          set -euo pipefail
          test -s output/mech_render.png || { echo "::error::mech_render.png missing"; exit 1; }
          test -s output/mid_poly_mech.blend || { echo "::error::mid_poly_mech.blend missing"; exit 1; }
          test -s output/mid_poly_mech.glb || { echo "::error::mid_poly_mech.glb missing"; exit 1; }

      - name: Compute similarity report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p report
          python3 scripts/measure_similarity.py \
            --reference reference/reference.jpg \
            --render output/mech_render.png \
            --out-json report/similarity_report.json \
            --out-md report/similarity_report.md \
            --out-overlay report/reference_render_overlay.png \
            --ignore-rect 0,0,180,170 | tee report/score_stdout.json

      - name: Add score to job summary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          data = json.loads(Path('report/similarity_report.json').read_text(encoding='utf-8'))
          print('# Similarity summary')
          print('')
          print(f"**Combined score:** {data['combined_score_0_to_100']:.2f} / 100")
          print('')
          print('| Metric | Score |')
          print('|---|---:|')
          for k, v in data['scores'].items():
              print(f'| {k} | {v:.4f} |')
          print('')
          print(f"Alpha mask used: {data.get('render_uses_alpha_mask')}")
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mech-render-score-v13-${{ github.run_number }}
          path: |
            output/
            report/
          if-no-files-found: warn
          retention-days: 30
